name: CD With ArgoCD

on:
  push:
    branches:
    - main
    - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-push-and-update-manifest:
    # 防止机器人提交触发无限循环。
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    env:
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          ${{ env.IMAGE_REPO }}:latest

    - name: Update Kubernetes manifest image tag
      run: |
        sed -i "s#^\(\s*image:\s*\).*#\1${IMAGE_REPO}:${IMAGE_TAG}#" k8s/base/deployment.yaml

    - name: Commit and push manifest update
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/base/deployment.yaml
        if git diff --cached --quiet; then
          echo "No manifest changes to commit"
          exit 0
        fi
        git commit -m "chore(gitops): update image to ${IMAGE_TAG}"
        git push
